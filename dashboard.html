<!DOCTYPE html>


<html lang="ar" dir="rtl">


<head>


    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>لوحة التحكم - BarberFlow-Pro</title>


    <link rel="stylesheet" href="css/style.css">


    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">


</head>


<body class="dashboard-body">


    <div class="salon-card">


        <div class="profile-header" id="coverImg"></div>


        <div class="card-content">


            <img src="https://via.placeholder.com/150" class="profile-pic" id="profileImg">


            <h2 id="shopNameDisplay">اسم الصالون</h2>


            <div class="dropdown">


                <button class="btn-settings" onclick="toggleMenu()">⚙️ الإعدادات</button>


                <div id="settingsMenu" class="dropdown-content">


                    <button onclick="document.getElementById('editSection').style.display='block'">تعديل البيانات</button>


                    <button onclick="document.getElementById('uploadSection').style.display='block'">تغيير الصور</button>


                    <button onclick="logout()">خروج</button>


                </div>


            </div>


        </div>


    </div>


    <div id="editSection" class="section" style="display:none;">


        <h3>تعديل معلومات الصالون</h3>


        <input type="text" id="editShopName" placeholder="اسم الصالون">


        <input type="text" id="editServices" placeholder="الخدمات (افصل بينها بفاصلة)">


        <button class="btn btn-gold" id="btnUpdate">حفظ التعديلات</button>


    </div>


    <div id="uploadSection" class="section" style="display:none;">


        <h3>تغيير صورة البروفايل</h3>


        <input type="file" accept="image/*" onchange="uploadImage(this.files[0])">


        <p style="font-size: 0.8rem; color: gray;">اختر صورة ليتم رفعها وتحديثها تلقائياً</p>


    </div>


    <script type="module" src="js/dashboard.js"></script>


</body>


</html>
