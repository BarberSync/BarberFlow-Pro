<!DOCTYPE html>


<html lang="ar" dir="rtl">


<head>


    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>انضم كحلاق - BarberFlow-Pro</title>


    <link rel="stylesheet" href="css/style.css">


    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">


</head>


<body>


    <div class="container" style="max-width: 500px; margin-top: 30px;">


        <h2 style="text-align: center;">تسجيل صالون جديد</h2>


        <form id="registerForm">


            <label>معلومات الدخول:</label>


            <input type="email" id="email" placeholder="البريد الإلكتروني" required 
                   style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd;">


            <input type="password" id="password" placeholder="كلمة المرور (6 أحرف فأكثر)" required 
                   style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd;">


            <hr style="margin: 20px 0; border: 0.5px solid #eee;">


            <label>معلومات الصالون:</label>


            <input type="text" id="shopName" placeholder="اسم الصالون" required 
                   style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd;">


            <input type="text" id="ownerName" placeholder="اسم صاحب الصالون" required 
                   style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd;">


            <input type="tel" id="phone" placeholder="رقم الهاتف (واتساب)" required 
                   style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd;">


            <input type="text" id="address" placeholder="العنوان بالتفصيل" required 
                   style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd;">


            <button type="submit" id="btnRegister" class="btn btn-gold" style="width: 100%; margin-top: 20px;">إنشاء الحساب والانضمام</button>


        </form>


        <div style="text-align: center; margin-top: 20px; padding-bottom: 30px;">


            <a href="login.html" style="color: var(--primary); text-decoration: none;">لديك حساب بالفعل؟ <span style="color: var(--gold); font-weight: bold;">سجل دخولك</span></a>


        </div>


    </div>


    <script type="module" src="js/register.js"></script>


</body>


</html>
