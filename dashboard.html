<!DOCTYPE html>


<html lang="ar" dir="rtl">


<head>


    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>لوحة التحكم | BarberFlow-Pro</title>


    <link rel="stylesheet" href="css/dashboard.css">


</head>


<body>


    <div class="dashboard-wrapper">


        <h1 id="displayShopName">اسم الصالون</h1>


        <p id="displayAddress">العنوان</p>


        <div class="btn-group">


            <button id="btn-settings" class="action-btn">تعديل معلومات الصالون</button>


            <button id="btn-edit" class="action-btn">تعديل بيانات الحساب</button>


            <button id="btn-logout" class="action-btn" style="color: red;">تسجيل الخروج</button>


        </div>


    </div>


    <div id="salonModal" class="modal">


        <div class="modal-content">


            <span class="close" id="closeSalonModal">&times;</span>


            <h2>معلومات الصالون</h2>


            <input type="text" placeholder="اسم الصالون">


            <button class="btn btn-gold">حفظ البيانات</button>


        </div>


    </div>


    <div id="loginModal" class="modal">


        <div class="modal-content">


            <span class="close" id="closeLoginModal">&times;</span>


            <h2>تعديل بيانات الدخول</h2>


            <input type="email" placeholder="البريد الإلكتروني الجديد">


            <button class="btn btn-gold">حفظ التغييرات</button>


        </div>


    </div>


    <script type="module" src="js/dashboard.js"></script>


</body>


</html>
