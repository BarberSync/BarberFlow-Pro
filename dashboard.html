<!DOCTYPE html>


<html lang="ar" dir="rtl">


<head>


    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>لوحة التحكم | BarberFlow-Pro</title>


    <link rel="stylesheet" href="style.css">


    <style>


        /* تنسيق سريع لضمان ظهور العناصر كما في الصورة */


        .profile-card {


            background: white;


            border-radius: 20px;


            padding: 20px;


            text-align: center;


            margin: 20px;


        }


        .profile-circle {


            width: 100px;


            height: 100px;


            border: 3px solid #D4AF37;


            border-radius: 50%;


            margin: 0 auto 15px;


        }


        .btn-group {


            display: flex;


            justify-content: center;


            gap: 10px;


            flex-wrap: wrap;


            margin-top: 15px;


        }


        .action-btn {


            background: #f0f0f0;


            border: none;


            padding: 8px 15px;


            border-radius: 15px;


            cursor: pointer;


            color: #007bff;


            font-size: 14px;


        }


    </style>


</head>


<body>


    <div class="dashboard-wrapper">


        <div class="profile-card">


            <div class="profile-circle"></div>


            <h2 id="display-salon-name">اسم الصالون</h2>


            <div class="btn-group">


                <button class="action-btn" id="btn-settings">⚙️ الإعدادات</button>


                <button class="action-btn" id="btn-edit">تعديل البيانات</button>


                <button class="action-btn" id="btn-photos">تغيير الصور</button>


                <button class="action-btn" id="btn-logout" style="color: red;">خروج</button>


            </div>


        </div>


    </div>


    <script>


        // وظيفة لتسريع التحميل وعرض البيانات فوراً


        window.onload = function() {


            console.log("تم تحميل الصفحة بنجاح");


            // هنا يمكن إضافة كود لجلب اسم الصالون من التخزين المحلي (LocalStorage)


        };


        function editData() {


            alert("تم فتح نافذة تعديل البيانات");


            // أضف هنا الكود البرمجي لفتح نموذج التعديل


        }


        function changePhotos() {


            alert("يمكنك الآن اختيار صور جديدة للصالون");


        }


        function openSettings() {


            alert("جاري الانتقال إلى الإعدادات");


        }


        function logout() {


            if(confirm("هل أنت متأكد من تسجيل الخروج؟")) {


                window.location.href = "login.html"; // العودة لصفحة الدخول


            }


        }


    </script>


    <script type="module" src="js/dashboard.js"></script>


</body>


</html>
