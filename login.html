<!DOCTYPE html>


<html lang="ar" dir="rtl">


<head>


    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>تسجيل الدخول - BarberFlow-Pro</title>


    <link rel="stylesheet" href="css/style.css">


    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">


</head>


<body>


    <div class="container">


        <h2>دخول أصحاب الصالونات</h2>


        <form id="loginForm">


            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>


            


            <input type="password" id="loginPassword" placeholder="كلمة المرور" required>


            


            <button type="submit" class="btn btn-gold">دخول</button>


            


            <div style="text-align: center; margin-top: 20px;">


                <p>ليس لديك حساب؟ <a href="register.html" style="color: var(--gold); text-decoration: none; font-weight: bold;">سجل صالونك الآن</a></p>


                <a href="index.html" style="display: block; margin-top: 15px; color: var(--primary); text-decoration: none; font-size: 0.9rem;">العودة للرئيسية</a>


            </div>


        </form>


    </div>


<script type="module" src="js/login.js"></script>



</body>


</html>
