<!DOCTYPE html>


<html lang="ar" dir="rtl">


<head>


    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>لوحة التحكم | BarberFlow-Pro</title>


    <link rel="stylesheet" href="dashboard.css">


    <style>


        /* تنسيق سريع لضمان ظهور العناصر */


        .profile-card {


            background: white;


            border-radius: 20px;


            padding: 20px;


            text-align: center;


            margin: 20px;


        }


        .profile-circle {


            width: 100px;


            height: 100px;


            border: 3px solid #D4AF37;


            border-radius: 50%;


            margin: 0 auto 15px;


        }


        .btn-group {


            display: flex;


            justify-content: center;


            gap: 10px;


            flex-wrap: wrap;


            margin-top: 15px;


        }


        .action-btn {


            background: #f0f0f0;


            border: none;


            padding: 8px 15px;


            border-radius: 15px;


            cursor: pointer;


            color: #007bff;


            font-size: 14px;


        }


    </style>


</head>


<body>


    <div class="dashboard-wrapper">


        <div class="profile-card">


            <div class="profile-circle"></div>


            <h2 id="display-salon-name">اسم الصالون</h2>





            <div class="btn-group">


                


                <div class="dropdown">


                    <button class="action-btn dropbtn">⚙️ الإعدادات</button>


                    <div class="dropdown-content">


                        <a href="#" onclick="openModal('loginModal')">بيانات الدخول</a>


                        <a href="#" onclick="openModal('salonModal')">معلومات الصالون</a>


                    </div>


                </div>






                <div class="dropdown">


                    <button class="action-btn dropbtn">📊 إدارة العرض</button>


                    <div class="dropdown-content">


                        <a href="#" onclick="openModal('servicesModal')">تعديل الخدمات</a>


                        <a href="#" onclick="openModal('descriptionModal')">تعديل الوصف</a>


                    </div>


                </div>






                <div class="dropdown">


                    <button class="action-btn dropbtn">🖼️ الصور</button>


                    <div class="dropdown-content">


                        <a href="#" onclick="triggerUpload('profilePic')">صورة البروفايل</a>


                        <a href="#" onclick="triggerUpload('galleryPics')">صور المعرض</a>


                    </div>


                </div>






                <button class="action-btn" id="btn-logout" style="color: red;" onclick="goToHome()">🚪 خروج</button>


            </div>


        </div>


    </div>



    <input type="file" id="profilePic" style="display:none" accept="image/*" onchange="handleFileUpload(this, 'profile')">


    <input type="file" id="galleryPics" style="display:none" accept="image/*" multiple onchange="handleFileUpload(this, 'gallery')">



    <div id="loginModal" class="modal">


        <div class="modal-content">


            <span class="close" onclick="closeModal('loginModal')">&times;</span>


            <h2>تعديل بيانات الدخول</h2>


            <input type="email" placeholder="الإيميل">


            <input type="password" placeholder="كلمة المرور">


            <button class="btn btn-gold">حفظ</button>


        </div>


    </div>




    <div id="salonModal" class="modal">


        <div class="modal-content">


            <span class="close" onclick="closeModal('salonModal')">&times;</span>


            <h2>معلومات الصالون</h2>


            <input type="text" placeholder="اسم الصالون">


            <input type="text" placeholder="العنوان">


            <button class="btn btn-gold">حفظ</button>


        </div>


    </div>




    <div id="servicesModal" class="modal">


        <div class="modal-content">


            <span class="close" onclick="closeModal('servicesModal')">&times;</span>


            <h2>تعديل الخدمات</h2>


            <input type="text" placeholder="اسم الخدمة والسعر">


            <button class="btn btn-gold">إضافة</button>


        </div>


    </div>




    <div id="descriptionModal" class="modal">


        <div class="modal-content">


            <span class="close" onclick="closeModal('descriptionModal')">&times;</span>


            <h2>تعديل الوصف</h2>


            <textarea style="width:100%; height:80px; padding:10px; box-sizing:border-box;"></textarea>


            <button class="btn btn-gold">حفظ الوصف</button>


        </div>


    </div>




    <script type="module" src="js/events.js"></script>


    <script type="module" src="js/dashboard.js"></script>


    


    <script>


        function openModal(id) { document.getElementById(id).style.display = "block"; }


        function closeModal(id) { document.getElementById(id).style.display = "none"; }


        function triggerUpload(id) { document.getElementById(id).click(); }


        function goToHome() { window.location.href = "index.html"; }


        window.onclick = function(event) {


            let modals = document.getElementsByClassName('modal');


            for (let i = 0; i < modals.length; i++) {


                if (event.target == modals[i]) modals[i].style.display = "none";


            }


        }


    </script>


</body>


</html>
