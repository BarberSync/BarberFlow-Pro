ملف عرض صفحة  تعديل  بطاقات الصلونات بعد تجاوز صفحة دخول  اصحاب الصلونات المسجلة 




<!DOCTYPE html>


<html lang="ar" dir="rtl">


<head>


    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>لوحة التحكم | BarberFlow-Pro</title>


    <link rel="stylesheet" href="css/dashboard.css">


    <style>


        /* تنسيق سريع لضمان ظهور العناصر كما في الصورة */


        .profile-card {


            background: white;


            border-radius: 20px;


            padding: 20px;


            text-align: center;


            margin: 20px;


        }


        .profile-circle {


            width: 100px;


            height: 100px;


            border: 3px solid #D4AF37;


            border-radius: 50%;


            margin: 0 auto 15px;


        }


        .btn-group {


            display: flex;


            justify-content: center;


            gap: 10px;


            flex-wrap: wrap;


            margin-top: 15px;


        }


        .action-btn {


            background: #f0f0f0;


            border: none;


            padding: 8px 15px;


            border-radius: 15px;


            cursor: pointer;


            color: #007bff;


            font-size: 14px;


        }


    </style>


</head>


<body>


    <div class="dashboard-wrapper">


        <div class="profile-card">


            <div class="profile-circle"></div>


            <h2 id="display-salon-name">اسم الصالون</h2>


            <div class="btn-group">


                <button class="action-btn" id="btn-settings">⚙️ الإعدادات</button>


                <button class="action-btn" id="btn-edit">تعديل البيانات</button>


                <button class="action-btn" id="btn-photos">تغيير الصور</button>


                <button class="action-btn" id="btn-logout" style="color: red;">خروج</button>


            </div>


        </div>


    </div>


    <div id="loginModal" class="modal">


        <div class="modal-content">


            <span class="close" onclick="closeModal('loginModal')">&times;</span>


            <h2>تعديل بيانات الدخول</h2>


            <input type="email" placeholder="البريد الإلكتروني الجديد">


            <input type="password" placeholder="كلمة المرور الجديدة">


            <button class="btn btn-gold">حفظ التغييرات</button>


        </div>


    </div>


    <div id="salonModal" class="modal">


        <div class="modal-content">


            <span class="close" onclick="closeModal('salonModal')">&times;</span>


            <h2>معلومات الصالون</h2>


            <input type="text" placeholder="اسم الصالون">


            <input type="text" placeholder="العنوان">


            <button class="btn btn-gold">حفظ البيانات</button>


        </div>


    </div>


    <div id="servicesModal" class="modal">


        <div class="modal-content">


            <span class="close" onclick="closeModal('servicesModal')">&times;</span>


            <h2>تعديل الخدمات</h2>


            <input type="text" placeholder="اسم الخدمة">


            <button class="btn btn-gold">إضافة الخدمة</button>


        </div>


    </div>


    <div id="descriptionModal" class="modal">


        <div class="modal-content">


            <span class="close" onclick="closeModal('descriptionModal')">&times;</span>


            <h2>تعديل الوصف</h2>


            <textarea placeholder="أدخل الوصف هنا..."></textarea>


            <button class="btn btn-gold">حفظ الوصف</button>


        </div>


    </div>


    <script type="module" src="js/events.js"></script>


    <script type="module" src="js/dashboard.js"></script>


</body>


</html>
